name: Build and deploy Node.js app to Azure Web App - cuts-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install, generate Prisma client, build, and test
        run: |
          npm ci
          npm run prisma:generate
          npm run build --if-present
          npm run test --if-present

      # Instalar solo dependencias de producción para el deploy
      - name: Install production dependencies
        run: |
          npm ci --omit=dev
          npm run prisma:generate

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: |
            dist/
            node_modules/
            package.json
            package-lock.json
            prisma/
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0AD2D7045AC641E8820E852F910D865B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_226B691361E94275A9AAF4E2AEB339C5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B629E8352194201858820EDE1890D33 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cuts-backend'
          slot-name: 'Production'
          package: .
          clean: true
          startup-command: 'node dist/src/main.js'
